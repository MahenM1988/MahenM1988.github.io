<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Microservice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #timestamp {
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <h1>Timestamp Microservice</h1>
    <button id="getTimestamp">Get Current Timestamp</button>
    <div id="timestamp"></div>

    <script>
        document.getElementById('getTimestamp').addEventListener('click', function() {
            const now = new Date();
            const timestamp = now.toISOString();
            document.getElementById('timestamp').innerText = `Current Timestamp: ${timestamp}`;
        });
    </script>
</body>
</html>
