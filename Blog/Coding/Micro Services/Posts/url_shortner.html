<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 300px;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        #shortenedUrl {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>URL Shortener</h1>
    <input type="text" id="urlInput" placeholder="Enter URL to shorten">
    <button id="shortenButton">Shorten URL</button>
    <div id="shortenedUrl"></div>

    <script>
        const baseUrl = window.location.href.split('#')[0]; // Base URL of the current page
        let idCounter = 0; // Counter for unique IDs

        // Load existing URLs from local storage
        const loadUrls = () => {
            const urls = JSON.parse(localStorage.getItem('urls')) || {};
            return urls;
        };

        // Save URL mapping to local storage
        const saveUrl = (shortUrl, originalUrl) => {
            const urls = loadUrls();
            urls[shortUrl] = originalUrl;
            localStorage.setItem('urls', JSON.stringify(urls));
        };

        // Shorten URL
        document.getElementById('shortenButton').addEventListener('click', function() {
            const originalUrl = document.getElementById('urlInput').value.trim();
            if (isValidUrl(originalUrl)) {
                idCounter++;
                const shortUrl = `#${idCounter}`; // Use hash as a simple identifier
                saveUrl(shortUrl, originalUrl);
                document.getElementById('shortenedUrl').innerHTML = 
                    `Shortened URL: <a href="${shortUrl}" onclick="redirect('${shortUrl}'); return false;">${baseUrl}${shortUrl}</a>`;
                document.getElementById('urlInput').value = ''; // Clear input
            } else {
                alert('Please enter a valid URL.');
            }
        });

        // Validate URL
        const isValidUrl = (url) => {
            const pattern = new RegExp('^(https?://)?(www\\.)?([a-zA-Z0-9-]+\\.[a-zA-Z]{2,})(/.*)?$');
            return pattern.test(url);
        };

        // Redirect function
        window.redirect = function(shortUrl) {
            const urls = loadUrls();
            const originalUrl = urls[shortUrl];
            if (originalUrl) {
                window.open(originalUrl, '_blank'); // Open in a new tab
            } else {
                alert('URL not found');
            }
        };
    </script>
</body>
</html>
