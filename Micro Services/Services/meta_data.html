<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Metadata Microservice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        input {
            padding: 10px;
            font-size: 16px;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        #metadataOutput {
            margin-top: 20px;
            font-size: 18px;
            white-space: pre-wrap;
            text-align: left;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>File Metadata Microservice</h1>
    <input type="file" id="fileInput">
    <button id="getMetadataButton">Get Metadata</button>
    <div id="metadataOutput"></div>

    <script>
        document.getElementById('getMetadataButton').addEventListener('click', function() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (file) {
                const metadata = {
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    lastModified: new Date(file.lastModified).toLocaleString()
                };

                let output = 'File Metadata:\n';
                for (const [key, value] of Object.entries(metadata)) {
                    output += `${key}: ${value}\n`;
                }
                document.getElementById('metadataOutput').innerText = output;
            } else {
                alert('Please select a file to get its metadata.');
            }
        });
    </script>
</body>
</html>
